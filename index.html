<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calcul Mental CP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-color: #f8fafc; /* Gris très clair, sobre */
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --mode-color: #6366f1; /* Indigo doux par défaut */
            --success: #10b981;
            --danger: #ef4444;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
        }

        body.mode-autonomie { --mode-color: #059669; } /* Vert émeraude sobre */
        body.mode-entrainement { --mode-color: #6366f1; } /* Indigo doux */
        body.mode-evaluation { --mode-color: #ea580c; } /* Orange brûlé */

        * { 
            box-sizing: border-box; 
            touch-action: manipulation; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            transition: all 0.3s ease; 
        }

        /* --- HEADER MODERNE ET SOBRE --- */
        header { 
            background-color: #ffffff; 
            padding: 15px 30px; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: space-between; 
            align-items: center; 
            gap: 20px; 
            box-shadow: var(--shadow-sm);
            border-top: 4px solid var(--mode-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title {
            display: flex;
            flex-direction: column;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.02em;
        }

        .header-title span {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* --- CONTRÔLES TYPE "PILULE" (iOS Style) --- */
        .controls-group { 
            display: flex; 
            gap: 15px; 
            align-items: center; 
            flex-wrap: wrap; 
        }

        .segmented-control {
            display: inline-flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 12px;
            gap: 2px;
        }

        button.tool-btn { 
            background: transparent; 
            color: var(--text-muted); 
            border: none; 
            padding: 8px 16px; 
            border-radius: 8px; 
            font-size: 0.9rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s; 
        }

        button.tool-btn:hover {
            color: #0f172a;
        }

        button.tool-btn.active { 
            background: #ffffff; 
            color: var(--mode-color); 
            box-shadow: var(--shadow-sm);
        }

        .timer-btn { padding: 8px 12px !important; min-width: 45px; }

        /* --- ESPACE DE TRAVAIL --- */
        .container { padding: 30px; max-width: 1600px; margin: 0 auto; }
        .workspace { display: grid; gap: 30px; }
        .layout-1 { grid-template-columns: 1fr; max-width: 600px; margin: 0 auto; }
        .layout-2 { grid-template-columns: repeat(2, 1fr); }
        .layout-4 { grid-template-columns: repeat(2, 1fr); }
        @media(min-width: 1024px) { .layout-4 { grid-template-columns: repeat(4, 1fr); } }

        /* --- CARTES JOUEURS --- */
        .player-card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            box-shadow: var(--shadow-lg); 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            border: 1px solid var(--border-light);
            position: relative;
            overflow: hidden;
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: var(--mode-color);
            opacity: 0.8;
        }

        .player-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-weight: 700; 
            color: #475569; 
            font-size: 1.1rem;
        }

        .timer-badge { 
            background: #fef2f2; 
            color: #ef4444; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.95rem; 
            font-weight: 700;
        }
        
        select.progression-select, select.student-select { 
            width: 100%; 
            padding: 12px 15px; 
            border-radius: 10px; 
            border: 1px solid var(--border-light); 
            font-size: 0.95rem; 
            background: #f8fafc; 
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
            cursor: pointer;
        }
        
        select.progression-select:focus, select.student-select:focus {
            border-color: var(--mode-color);
            background: #ffffff;
        }

        .progress-indicator { 
            text-align: center; 
            font-size: 0.85rem; 
            font-weight: 600; 
            color: var(--text-muted); 
            display: none; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        body.mode-evaluation .progress-indicator { display: block; }

        .exercise-display { 
            font-size: 3rem; 
            text-align: center; 
            font-weight: 800; 
            padding: 20px 0; 
            color: #0f172a; 
            min-height: 120px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            letter-spacing: -0.03em;
        }

        .input-area { display: flex; gap: 12px; }
        
        input.answer-input { 
            flex: 1; 
            padding: 15px; 
            font-size: 2rem; 
            text-align: center; 
            border: 2px solid var(--border-light); 
            border-radius: 14px; 
            font-weight: 700; 
            width: 100%; 
            color: #0f172a;
            background: #f8fafc;
            transition: all 0.2s;
        }
        
        input.answer-input:focus { 
            outline: none; 
            border-color: var(--mode-color); 
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .action-btns { display: flex; gap: 10px; }
        
        .btn-action { 
            width: 70px; 
            border: none; 
            border-radius: 14px; 
            font-size: 1.5rem; 
            color: white; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: transform 0.1s, opacity 0.2s;
        }
        
        .btn-v { background-color: var(--success); }
        .btn-x { background-color: var(--danger); }
        .btn-action:active { transform: scale(0.92); }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }

        .feedback-area { 
            min-height: 85px; 
            padding: 15px 20px; 
            border-radius: 12px; 
            background: #f1f5f9; 
            font-size: 1rem; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            color: var(--text-muted);
            border: 1px solid transparent;
            transition: all 0.3s;
        }

        .feedback-area.correct { 
            background: #ecfdf5; 
            color: #065f46; 
            border-color: #a7f3d0; 
        }

        .feedback-area.incorrect { 
            background: #fef2f2; 
            color: #991b1b; 
            border-color: #fecaca; 
        }

        .feedback-area.saving { 
            background: #fffbeb; 
            color: #b45309; 
            border-color: #fde68a; 
        }

        .strategy { 
            font-size: 0.9rem; 
            margin-top: 6px; 
            opacity: 0.85; 
        }
    </style>
</head>
<body class="mode-entrainement">

    <header>
        <div class="header-title">
            <h1>Calcul Mental CP</h1>
            <span>Application d'entraînement et d'évaluation</span>
        </div>
        
        <div class="controls-group">
            <div class="segmented-control">
                <button class="tool-btn mode-btn" onclick="setMode('autonomie', 'mode-autonomie')">Autonomie</button>
                <button class="tool-btn mode-btn active" onclick="setMode('entrainement', 'mode-entrainement')">Entraînement</button>
                <button class="tool-btn mode-btn" onclick="setMode('evaluation', 'mode-evaluation')">Évaluation</button>
            </div>
            
            <div class="segmented-control" id="timer-config-container">
                <button class="tool-btn timer-btn" data-val="0" onclick="setTimer(0, this)" title="Désactivé">∞</button>
                <button class="tool-btn timer-btn" data-val="5" onclick="setTimer(5, this)">5s</button>
                <button class="tool-btn timer-btn" data-val="10" onclick="setTimer(10, this)">10s</button>
                <button class="tool-btn timer-btn active" data-val="15" onclick="setTimer(15, this)">15s</button>
                <button class="tool-btn timer-btn" data-val="30" onclick="setTimer(30, this)">30s</button>
                <button class="tool-btn timer-btn" data-val="60" onclick="setTimer(60, this)">60s</button>
                <button class="tool-btn timer-btn" data-val="120" onclick="setTimer(120, this)">120s</button>
            </div>

            <div class="segmented-control">
                <button class="tool-btn layout-btn active" onclick="setLayout(1)">Seul</button>
                <button class="tool-btn layout-btn" onclick="setLayout(2)">Duo</button>
                <button class="tool-btn layout-btn" onclick="setLayout(4)">Par 4</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div id="app-workspace" class="workspace layout-1">
            <!-- Cartes injectées ici -->
        </div>
    </div>

    <script>
        // LISTE DES ÉLÈVES (Statique pour GitHub, remplacez les noms ci-dessous par ceux de votre classe)
        const studentsList = [
            "Élève 1", "Élève 2", "Élève 3", "Élève 4", "Élève 5", "Élève 6",
            "Élève 7", "Élève 8", "Élève 9", "Élève 10", "Élève 11", "Élève 12",
            "Élève 13", "Élève 14", "Élève 15", "Élève 16", "Élève 17", "Élève 18",
            "Élève 19", "Élève 20", "Élève 21", "Élève 22", "Élève 23", "Élève 24",
            "Élève 25", "Élève 26", "Élève 27", "Élève 28", "Élève 29", "Élève 30"
        ];

        const progressionData = {
            "A": { t: "A. +1 / -1", gen: () => { let n=Math.floor(Math.random()*20)+1; let op=Math.random()>0.5?'+':'-'; return { q: `${n} ${op} 1 =`, r: op==='+'?n+1:n-1, s: "Avancer ou reculer d'une case."}; }},
            "B": { t: "B. Maisons de 2, 3", gen: () => { let max=Math.random()>0.5?2:3; let n=Math.floor(Math.random()*(max+1)); return { q: `${n} + ... = ${max}`, r: max-n, s: `Combien manque-t-il pour faire ${max} ?`}; }},
            "C": { t: "C. Maisons de 4, de 5", gen: () => { let max=Math.random()>0.5?4:5; let n=Math.floor(Math.random()*(max+1)); return { q: `${n} + ... = ${max}`, r: max-n, s: `Complète jusqu'à ${max}.`}; }},
            "D": { t: "D. Décomposition avec 5", gen: () => { let n=Math.floor(Math.random()*5)+1; return { q: `5 + ${n} =`, r: 5+n, s: `Une main (5) et encore ${n}.`}; }},
            "E": { t: "E. Petits doubles (≤10)", gen: () => { let n=Math.floor(Math.random()*5)+1; return { q: `Double de ${n}`, r: n*2, s: `C'est ${n} + ${n}.`}; }},
            "F": { t: "F. Presque doubles", gen: () => { let n=Math.floor(Math.random()*4)+2; return { q: `${n} + ${n+1} =`, r: n+(n+1), s: `C'est le double de ${n} plus 1.`}; }},
            "G": { t: "G. Maison de 6", gen: () => { let n=Math.floor(Math.random()*7); return { q: `${n} + ... = 6`, r: 6-n, s: `Complément pour faire 6.`}; }},
            "H": { t: "H. Compléments à 10", gen: () => { let n=Math.floor(Math.random()*11); return { q: `${n} + ... = 10`, r: 10-n, s: `Cherche l'ami de ${n} pour faire 10.`}; }},
            "I": { t: "I. Doubles <20", gen: () => { let n=Math.floor(Math.random()*4)+6; return { q: `Double de ${n}`, r: n*2, s: `C'est ${n} + ${n}.`}; }},
            "J": { t: "J. Ajouter/Soustraire 10", gen: () => { let n=Math.floor(Math.random()*80)+10; let op=Math.random()>0.5?'+':'-'; return { q: `${n} ${op} 10 =`, r: op==='+'?n+10:n-10, s: `Les unités ne changent pas.`}; }},
            "K": { t: "K. + ou - U (via 10)", gen: () => { let n=Math.floor(Math.random()*8)+2; let op=Math.random()>0.5?'+':'-'; return { q: `10 ${op} ${n} =`, r: op==='+'?10+n:10-n, s: `S'appuyer sur la dizaine entière.`}; }},
            "L": { t: "L. Maison de 7", gen: () => { let n=Math.floor(Math.random()*8); return { q: `${n} + ... = 7`, r: 7-n, s: `Complément pour faire 7.`}; }},
            "M": { t: "M. Doubles des dizaines", gen: () => { let n=(Math.floor(Math.random()*4)+1)*10; return { q: `Double de ${n}`, r: n*2, s: `Double les dizaines et garde le zéro.`}; }},
            "N": { t: "N. Maison de 8", gen: () => { let n=Math.floor(Math.random()*9); return { q: `${n} + ... = 8`, r: 8-n, s: `Complément pour faire 8.`}; }},
            "O": { t: "O. Compléments dizaine sup.", gen: () => { let d=(Math.floor(Math.random()*8)+1)*10; let n=d+Math.floor(Math.random()*9)+1; return { q: `De ${n} à ${d+10} ?`, r: (d+10)-n, s: `Cherche le complément à 10 pour l'unité.`}; }},
            "P": { t: "P. + ou - D", gen: () => { let n=Math.floor(Math.random()*50)+10; let d=(Math.floor(Math.random()*4)+1)*10; let op=Math.random()>0.5?'+':'-'; return { q: `${n} ${op} ${d} =`, r: op==='+'?n+d:n-d, s: `On ajoute/enlève que les dizaines.`}; }},
            "Q": { t: "Q. Moitiés de 2 à 20", gen: () => { let n=(Math.floor(Math.random()*10)+1)*2; return { q: `Moitié de ${n}`, r: n/2, s: `Partage ${n} en deux parts égales.`}; }},
            "R": { t: "R. Ajouter 20, 30... 90", gen: () => { let n=Math.floor(Math.random()*10)+1; let d=(Math.floor(Math.random()*8)+2)*10; return { q: `${n} + ${d} =`, r: n+d, s: `Unités avec unités, dizaines avec dizaines.`}; }},
            "S": { t: "S. Ajouter 2 nombres <100", gen: () => { let a=Math.floor(Math.random()*40)+10; let b=Math.floor(Math.random()*40)+10; return { q: `${a} + ${b} =`, r: a+b, s: `Additionne les dizaines ensemble, puis les unités.`}; }},
            "T": { t: "T. D - U", gen: () => { let d=(Math.floor(Math.random()*8)+2)*10; let u=Math.floor(Math.random()*9)+1; return { q: `${d} - ${u} =`, r: d-u, s: `Casse la dizaine pour soustraire.`}; }},
            "U": { t: "U. Maison de 9", gen: () => { let n=Math.floor(Math.random()*10); return { q: `${n} + ... = 9`, r: 9-n, s: `Complément pour faire 9.`}; }},
            "V": { t: "V. DU + DU", gen: () => { let a=Math.floor(Math.random()*30)+11; let b=Math.floor(Math.random()*30)+11; return { q: `${a} + ${b} =`, r: a+b, s: `D+D et U+U dans ta tête.`}; }},
            "W": { t: "W. Tables +2 et +7", gen: () => { let a=Math.floor(Math.random()*10)+1; let b=Math.random()>0.5?2:7; return { q: `${a} + ${b} =`, r: a+b, s: `Surcompte de ${b}.`}; }},
            "X": { t: "X. Tables +3 et +8", gen: () => { let a=Math.floor(Math.random()*10)+1; let b=Math.random()>0.5?3:8; return { q: `${a} + ${b} =`, r: a+b, s: b===8?`+8, c'est +10 puis on enlève 2.`:`Avance de 3 cases.`}; }},
            "Y": { t: "Y. Tables +4 et +9", gen: () => { let a=Math.floor(Math.random()*10)+1; let b=Math.random()>0.5?4:9; return { q: `${a} + ${b} =`, r: a+b, s: b===9?`+9, c'est +10 puis on enlève 1.`:`Avance de 4.`}; }},
            "Z": { t: "Z. Tables +5 et +6", gen: () => { let a=Math.floor(Math.random()*10)+1; let b=Math.random()>0.5?5:6; return { q: `${a} + ${b} =`, r: a+b, s: `Utilise les repères du 5.`}; }}
        };

        let currentMode = 'mode-entrainement';
        let players = [];
        let timerConfig = 15;

        function populateStudentDropdowns() {
            document.querySelectorAll('.student-select').forEach(select => {
                let currentVal = select.value;
                select.innerHTML = '<option value="">Sélectionner un élève...</option>';
                studentsList.forEach(student => {
                    select.innerHTML += `<option value="${student}">${student}</option>`;
                });
                select.value = currentVal; 
            });
        }

        function setMode(mode, className) {
            document.body.className = className;
            currentMode = className;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const timerContainer = document.getElementById('timer-config-container');
            if (className === 'mode-autonomie') {
                timerContainer.style.display = 'none';
                timerConfig = 0;
            } else {
                timerContainer.style.display = 'inline-flex';
                const activeBtn = document.querySelector('.timer-btn.active');
                timerConfig = activeBtn ? parseInt(activeBtn.dataset.val) : 15;
            }
            
            players.forEach(p => resetSession(p.id)); 
        }

        function setTimer(val, btnElem) {
            timerConfig = val;
            document.querySelectorAll('.timer-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElem) btnElem.classList.add('active');
            players.forEach(p => nextQuestion(p.id)); 
        }

        function setLayout(count) {
            document.querySelectorAll('.layout-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            buildWorkspace(count);
        }

        function resetSession(id) {
            const p = players.find(x => x.id === id);
            if(p) {
                p.score = 0;
                p.qCount = 0;
                p.evalFinished = false;
                document.getElementById(`input-${id}`).disabled = false;
                document.querySelectorAll(`#action-btns-${id} button`).forEach(b => b.disabled = false);
                nextQuestion(id);
            }
        }

        function buildWorkspace(count) {
            const ws = document.getElementById('app-workspace');
            ws.className = `workspace layout-${count}`;
            ws.innerHTML = '';
            players = [];

            let optionsProg = '<option value="">Choisir une notion CP...</option>';
            for(let key in progressionData) {
                optionsProg += `<option value="${key}">${progressionData[key].t}</option>`;
            }

            for(let i = 1; i <= count; i++) {
                players.push({ id: i, timer: null, currentQ: null, score: 0, qCount: 0, evalFinished: false });
                
                const card = document.createElement('div');
                card.className = 'player-card';
                card.innerHTML = `
                    <div class="player-header">
                        <span>Poste ${i}</span>
                        <span id="timer-badge-${i}" class="timer-badge" style="display:none;"></span>
                    </div>
                    
                    <select id="student-${i}" class="student-select" onchange="resetSession(${i})">
                        <option value="">Sélectionner un élève...</option>
                    </select>

                    <select id="prog-${i}" class="progression-select" onchange="resetSession(${i})">
                        ${optionsProg}
                    </select>
                    
                    <div id="progress-${i}" class="progress-indicator">Question 0 / 10</div>

                    <div id="display-${i}" class="exercise-display">Prêt ?</div>
                    
                    <div class="input-area">
                        <input type="tel" id="input-${i}" class="answer-input" placeholder="?" onkeydown="if(event.key==='Enter') validate(${i})">
                        <div class="action-btns" id="action-btns-${i}">
                            <button class="btn-action btn-x" onclick="clearInput(${i})" title="Corriger">✖</button>
                            <button class="btn-action btn-v" onclick="validate(${i})" title="Valider">✔</button>
                        </div>
                    </div>
                    
                    <div id="feedback-${i}" class="feedback-area">
                        Sélectionnez une notion pour commencer.
                    </div>
                `;
                ws.appendChild(card);
                
                document.getElementById(`prog-${i}`).value = 'A';
                nextQuestion(i);
            }
            populateStudentDropdowns();
        }

        function nextQuestion(id) {
            const p = players.find(x => x.id === id);
            if(p.evalFinished) return;

            const progKey = document.getElementById(`prog-${id}`).value;
            if(!progKey) return;
            
            p.currentQ = progressionData[progKey].gen();
            document.getElementById(`display-${id}`).innerText = p.currentQ.q;
            
            const input = document.getElementById(`input-${id}`);
            input.value = '';
            input.disabled = false;
            input.focus();
            
            const feedback = document.getElementById(`feedback-${id}`);
            feedback.className = 'feedback-area';
            feedback.innerHTML = 'À vous de jouer !';

            if (currentMode === 'mode-evaluation') {
                document.getElementById(`progress-${id}`).innerText = `Question ${p.qCount + 1} / 10`;
            }
            
            startTimer(id);
        }

        function startTimer(id) {
            const p = players.find(x => x.id === id);
            clearInterval(p.timer);
            
            const badge = document.getElementById(`timer-badge-${id}`);
            if(timerConfig === 0) {
                badge.style.display = 'none';
                return;
            }
            
            badge.style.display = 'block';
            let timeLeft = timerConfig;
            badge.innerText = `${timeLeft}s`;
            
            p.timer = setInterval(() => {
                timeLeft--;
                badge.innerText = `${timeLeft}s`;
                if(timeLeft <= 0) {
                    clearInterval(p.timer);
                    timeOutFail(id);
                }
            }, 1000);
        }

        function clearInput(id) {
            const input = document.getElementById(`input-${id}`);
            input.value = '';
            input.focus();
        }

        function timeOutFail(id) { processAnswer(id, null); }
        function validate(id) {
            const input = document.getElementById(`input-${id}`);
            processAnswer(id, parseInt(input.value));
        }

        function processAnswer(id, userVal) {
            const p = players.find(x => x.id === id);
            if(!p.currentQ || p.evalFinished) return;
            
            clearInterval(p.timer);
            
            const feedback = document.getElementById(`feedback-${id}`);
            document.getElementById(`input-${id}`).disabled = true;

            if(userVal === p.currentQ.r) {
                if(currentMode === 'mode-evaluation') p.score++;
                feedback.className = 'feedback-area correct';
                feedback.innerHTML = `<div><strong>✅ Bravo !</strong></div><div class="strategy">💡 ${p.currentQ.s}</div>`;
            } else {
                feedback.className = 'feedback-area incorrect';
                feedback.innerHTML = `<div><strong>❌ Oups !</strong> C'était <strong>${p.currentQ.r}</strong>.</div><div class="strategy">💡 ${p.currentQ.s}</div>`;
            }

            if(currentMode === 'mode-evaluation') {
                p.qCount++;
                document.getElementById(`progress-${id}`).innerText = `Question ${p.qCount} / 10`;
                
                if(p.qCount >= 10) {
                    p.evalFinished = true;
                    document.querySelectorAll(`#action-btns-${id} button`).forEach(b => b.disabled = true);
                    setTimeout(() => endEvaluation(id), 3000);
                    return;
                }
            }
            
            setTimeout(() => nextQuestion(id), 3000);
        }

        function endEvaluation(id) {
            const p = players.find(x => x.id === id);
            const student = document.getElementById(`student-${id}`).value;
            const feedback = document.getElementById(`feedback-${id}`);

            feedback.className = 'feedback-area saving';
            
            if (!student) {
                feedback.innerHTML = `<strong>Évaluation terminée !</strong><br>Score : ${p.score} / 10<br><small style="color: #ea580c;">⚠️ Aucun élève sélectionné.</small>`;
            } else {
                feedback.innerHTML = `<strong>Évaluation terminée pour ${student} !</strong><br>Score : ${p.score} / 10`;
            }
        }

        window.onload = () => {
            buildWorkspace(1);
        };
    </script>
</body>
</html>
